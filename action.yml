name: "sessionlint run"
description: >
  Budgeted, model-laddered `claude -p` runs in CI, with the full RunResult
  (per-rung cost, model used, success-check outcome) uploaded as a JSON job
  artifact. Wraps `sessionlint run` — see docs/phases/PHASE-4.md Task 2.
branding:
  icon: "shield"
  color: "purple"

inputs:
  prompt:
    description: "The task prompt passed to `claude -p`."
    required: true
  model-ladder:
    description: "Comma-separated models to try in order, e.g. haiku,sonnet."
    required: true
  success-check:
    description: >
      Shell command whose exit code defines task success (e.g. "npm test").
      Never Claude's own self-reported result — see PHASE-4.md Task 2.
    required: true
  anthropic-api-key:
    description: "Passed through as ANTHROPIC_API_KEY to the `claude` CLI."
    required: true
  budget:
    description: "Optional per-rung $ budget cap (--max-budget-usd)."
    required: false
  timeout:
    description: "Optional wall-clock cap per rung, in seconds."
    required: false
  permission-mode:
    description: "Passed through to `claude -p --permission-mode`. Default: acceptEdits."
    required: false
    default: "acceptEdits"

outputs:
  report-path:
    description: "Path to the JSON RunResult report on the runner filesystem."
    value: ${{ steps.run.outputs.report-path }}

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@v2

    - name: Install sessionlint's own dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: bun install --frozen-lockfile

    - name: Install the Claude Code CLI
      shell: bash
      # `sessionlint run` shells out to the real `claude` binary (not just the Anthropic SDK)
      # — verified against this package's real, live npm registry entry before writing this
      # action, not assumed. See docs/phases/PHASE-4.md Task 6.
      run: npm install -g @anthropic-ai/claude-code

    - name: Run sessionlint
      id: run
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
      run: |
        set +e
        ARGS=(run
          --prompt "${{ inputs.prompt }}"
          --model-ladder "${{ inputs.model-ladder }}"
          --success-check "${{ inputs.success-check }}"
          --permission-mode "${{ inputs.permission-mode }}"
          --project-dir "${{ github.workspace }}"
          --yes --json)
        if [ -n "${{ inputs.budget }}" ]; then ARGS+=(--budget "${{ inputs.budget }}"); fi
        if [ -n "${{ inputs.timeout }}" ]; then ARGS+=(--timeout "${{ inputs.timeout }}"); fi

        REPORT_PATH="${{ github.action_path }}/sessionlint-report.json"
        bun run index.ts "${ARGS[@]}" > "$REPORT_PATH"
        EXIT_CODE=$?
        echo "report-path=$REPORT_PATH" >> "$GITHUB_OUTPUT"
        cat "$REPORT_PATH"
        exit $EXIT_CODE

    - name: Upload sessionlint report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: sessionlint-report
        path: ${{ steps.run.outputs.report-path }}
